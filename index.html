<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D AR Restaurant Menu</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background-color: #fafafa; overflow: hidden; font-family: sans-serif; }
        #menu-container { width: 100vw; height: 100vh; position: relative; }
        model-viewer { width: 100%; height: 100%; display: block; }
        
        #custom-ar-btn {
            background-color: #e22525;
            color: #ffffff;
            border: none;
            border-radius: 30px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 8px 24px rgba(226, 37, 37, 0.3);
            cursor: pointer;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <model-viewer 
            src="bmw_e34_stance_style.glb" 
            ios-src="bmw_e34_stance_style.usdz" 
            ar 
            ar-modes="webxr quick-look scene-viewer" 
            camera-controls 
            touch-action="pan-y"
            shadow-intensity="1.5"
            ar-placement="floor">
            
            <button slot="ar-button" id="custom-ar-btn">
                🍽️ VIEW ON MY TABLE
            </button>
            
        </model-viewer>
    </div>

</body>
</html>
